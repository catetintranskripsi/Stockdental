<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Atur Ulang Password - StockDental</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/pages-override.css">
</head>
<body>

  <div class="container" id="resetContainer">

    <div class="landing-info">
      <h1>StockDental</h1>
      <p class="landing-tagline">Atur Ulang Password</p>
    </div>

    <div id="resetFormView">
      <h2>Buat Password Baru</h2>

      <form id="formResetPassword">
        <div class="form-group">
          <label for="newPassword">Password Baru</label>
          <input type="password" id="newPassword" required placeholder="Minimal 6 karakter" minlength="6">
        </div>

        <div class="form-group">
          <label for="newPasswordConfirm">Konfirmasi Password Baru</label>
          <input type="password" id="newPasswordConfirm" required minlength="6">
        </div>

        <button type="submit" id="resetPasswordBtn">Simpan Password Baru</button>
      </form>

      <div id="resetStatus" class="status-message"></div>
    </div>

    <div id="resetInvalidView" style="display:none;">
      <h2>Link Tidak Valid</h2>
      <p class="switch-text">Link atur ulang password ini sudah tidak berlaku atau sudah pernah dipakai. Silakan minta link baru dari halaman login.</p>
      <a href="index.html"><button type="button">Kembali ke Login</button></a>
    </div>

  </div>

  <!-- Supabase library dari CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/reset-password.js"></script>
</body>
</html>
