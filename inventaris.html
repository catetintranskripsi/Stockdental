<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StockDental - Inventaris</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* ============ P10: Sortir, tap-to-expand, pagination ============ */

    .inventaris-toolbar {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 12px;
    }

    #inventarisSortSelect {
      flex-shrink: 0;
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      background: #fff;
      font-size: 14px;
    }

    .inventaris-item {
      cursor: pointer;
    }

    .inventaris-item-main {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .inventaris-chevron {
      margin-left: auto;
      color: #888;
      font-size: 14px;
      flex-shrink: 0;
    }

    .inventaris-item-expand {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px dashed #ddd;
      cursor: default;
    }

    .expand-fields {
      font-size: 14px;
      margin-bottom: 10px;
      color: #444;
    }

    .expand-history strong, .expand-lots strong {
      display: block;
      font-size: 13px;
      color: #666;
      margin-bottom: 6px;
    }

    .expand-lots {
      margin-bottom: 10px;
    }

    .history-list, .lots-list {
      list-style: none;
      margin: 0;
      padding: 0;
    }

    .history-list li, .lots-list li {
      display: flex;
      gap: 10px;
      font-size: 13px;
      padding: 4px 0;
      border-bottom: 1px solid #f0f0f0;
    }

    .history-list li:last-child, .lots-list li:last-child {
      border-bottom: none;
    }

    .history-date {
      color: #888;
      min-width: 90px;
    }

    .history-type {
      flex: 1;
    }

    .history-qty, .lot-qty {
      font-weight: 600;
    }

    .lot-batch {
      min-width: 110px;
    }

    .lot-expiry {
      flex: 1;
      color: #888;
    }

    .history-loading, .history-empty {
      font-size: 13px;
      color: #888;
      margin: 0;
    }

    /* ---- Pagination ---- */
    .inventaris-pagination {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 6px;
      margin-top: 16px;
      padding-bottom: 8px;
    }

    .page-number {
      min-width: 34px;
      height: 34px;
      padding: 0 6px;
      border-radius: 6px;
      border: 1px solid #ddd;
      background: #fff;
      font-size: 14px;
      cursor: pointer;
    }

    .page-number.active {
      background: #2b7a78;
      color: #fff;
      border-color: #2b7a78;
      font-weight: 600;
    }

    .page-ellipsis {
      display: flex;
      align-items: center;
      padding: 0 4px;
      color: #999;
    }
  </style>
</head>
<body>

  <!-- ============ AUTH CHECK SECTION ============ -->
  <div class="container" id="authContainer">
    <div id="loginRequiredView">
      <h1>StockDental</h1>
      <h2>Silakan login terlebih dahulu</h2>
      <p><a href="index.html">Kembali ke halaman login</a></p>
    </div>
  </div>

  <!-- ============ APP SECTION (tampil setelah login) ============ -->
  <div class="container" id="appContainer" style="display:none; padding-bottom: 80px;">

    <div class="app-header">
      <div>
        <h1>StockDental</h1>
        <h2>Inventaris</h2>
      </div>
      <button id="logoutBtn" class="btn-secondary">Logout</button>
    </div>

    <!-- SEARCH BOX -->
    <div class="form-group">
      <input type="text" id="inventarisSearchInput" placeholder="Cari nama barang..." autocomplete="off">
    </div>

    <!-- TOOLBAR: dropdown sortir -->
    <div class="inventaris-toolbar">
      <select id="inventarisSortSelect">
        <option value="status">Urutkan: Status</option>
        <option value="nama">Urutkan: Nama</option>
        <option value="stok">Urutkan: Stok</option>
        <option value="kategori">Urutkan: Kategori</option>
      </select>
    </div>

    <!-- RINGKASAN STATUS -->
    <div id="inventarisSummary" class="inventaris-summary"></div>

    <!-- LIST BARANG -->
    <div id="inventarisList" class="inventaris-list">
      <p class="loading-text">Memuat data...</p>
    </div>

    <!-- PAGINATION -->
    <div id="inventarisPagination" class="inventaris-pagination"></div>

  </div>

  <!-- ============ BOTTOM NAVIGATION ============ -->
  <nav class="bottom-nav" id="bottomNav" style="display:none;">
    <a href="ringkasan.html" class="nav-item">
      <span class="nav-icon">📊</span>
      <span class="nav-label">Ringkasan</span>
    </a>
    <a href="index.html" class="nav-item">
      <span class="nav-icon">📝</span>
      <span class="nav-label">Input</span>
    </a>
    <a href="inventaris.html" class="nav-item active">
      <span class="nav-icon">📦</span>
      <span class="nav-label">Inventaris</span>
    </a>
    <a href="history.html" class="nav-item">
      <span class="nav-icon">📈</span>
      <span class="nav-label">Riwayat</span>
    </a>
  </nav>

  <!-- Supabase library dari CDN -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-client.js"></script>
<script src="js/inventaris.js"></script>
<script src="js/auth-check.js"></script>
</body>
</html>
