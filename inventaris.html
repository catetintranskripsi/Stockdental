<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StockDental - Inventaris</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* ============ P10: Sortir, tap-to-expand, pagination ============ */

    .inventaris-toolbar {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    #inventarisSortSelect {
      flex-shrink: 0;
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      background: #fff;
      font-size: 14px;
    }

    #exportPdfBtn {
      margin-left: auto;
      padding: 8px 14px;
      border-radius: 8px;
      font-size: 14px;
      white-space: nowrap;
    }

    #exportPdfBtn:disabled {
      opacity: 0.6;
    }

    /* ---- Toolbar Gabungkan Barang ---- */
    #toggleMergeModeBtn {
      padding: 8px 14px;
      border-radius: 8px;
      font-size: 14px;
      white-space: nowrap;
      border: 1px solid #2b7a78;
      background: #fff;
      color: #2b7a78;
      cursor: pointer;
    }

    #confirmMergeBtn {
      display: none;
      padding: 8px 14px;
      border-radius: 8px;
      font-size: 14px;
      white-space: nowrap;
      border: none;
      background: #2b7a78;
      color: #fff;
      cursor: pointer;
    }

    #confirmMergeBtn:disabled {
      opacity: 0.6;
    }

    .inventaris-item {
      cursor: pointer;
    }

    .inventaris-item-main {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .merge-checkbox {
      flex-shrink: 0;
      width: 18px;
      height: 18px;
      pointer-events: none; /* klik ditangani lewat card, bukan checkbox itu sendiri, biar tidak dobel-toggle */
    }

    .inventaris-item.selection-mode {
      border: 1px solid #ddd;
    }

    .inventaris-item.selection-mode.selected {
      border: 2px solid #2b7a78;
      background: #f0f8f7;
    }

    .inventaris-chevron {
      margin-left: auto;
      color: #888;
      font-size: 14px;
      flex-shrink: 0;
    }

    .inventaris-item-expand {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px dashed #ddd;
      cursor: default;
    }

    .expand-fields {
      font-size: 14px;
      margin-bottom: 10px;
      color: #444;
    }

    .expand-history strong, .expand-lots strong {
      display: block;
      font-size: 13px;
      color: #666;
      margin-bottom: 6px;
    }

    .expand-lots {
      margin-bottom: 10px;
    }

    .history-list, .lots-list {
      list-style: none;
      margin: 0;
      padding: 0;
    }

    .history-list li, .lots-list li {
      display: flex;
      gap: 10px;
      font-size: 13px;
      padding: 4px 0;
      border-bottom: 1px solid #f0f0f0;
    }

    .history-list li:last-child, .lots-list li:last-child {
      border-bottom: none;
    }

    .history-date {
      color: #888;
      min-width: 90px;
    }

    .history-type {
      flex: 1;
    }

    .history-qty, .lot-qty {
      font-weight: 600;
    }

    .history-merge .history-type {
      color: #2b7a78;
      font-style: italic;
    }

    .lot-batch {
      min-width: 110px;
    }

    .lot-expiry {
      flex: 1;
      color: #888;
    }

    .history-loading, .history-empty {
      font-size: 13px;
      color: #888;
      margin: 0;
    }

    /* ---- Edit Data Barang (P-Edit) ---- */
    .expand-fields-view {
      font-size: 14px;
      margin-bottom: 10px;
      color: #444;
    }

    .expand-fields-view > div {
      margin-bottom: 4px;
    }

    .btn-edit-item {
      margin-top: 8px;
      padding: 6px 12px;
      font-size: 13px;
      border-radius: 8px;
      border: 1px solid #2b7a78;
      background: #fff;
      color: #2b7a78;
      cursor: pointer;
    }

    .expand-fields-edit {
      margin-bottom: 12px;
    }

    .edit-form {
      background: #f8f9f9;
      border-radius: 10px;
      padding: 12px;
    }

    .edit-form-group {
      margin-bottom: 10px;
    }

    .edit-form-group label {
      display: block;
      font-size: 12px;
      color: #666;
      margin-bottom: 4px;
    }

    .edit-input {
      width: 100%;
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 14px;
      box-sizing: border-box;
    }

    .edit-stock-note {
      font-size: 12px;
      color: #888;
      margin: 8px 0;
      font-style: italic;
    }

    .edit-form-actions {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }

    .edit-form-actions .btn-primary,
    .edit-form-actions .btn-secondary {
      flex: 1;
      padding: 10px;
      font-size: 14px;
      border-radius: 8px;
    }

    .edit-status-message {
      margin-top: 8px;
      font-size: 13px;
    }

    .edit-status-error {
      color: #c0392b;
    }

    .edit-status-success {
      color: #1e8449;
    }

    /* ---- Pagination ---- */
    .inventaris-pagination {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 6px;
      margin-top: 16px;
      padding-bottom: 8px;
    }

    .page-number {
      min-width: 34px;
      height: 34px;
      padding: 0 6px;
      border-radius: 6px;
      border: 1px solid #ddd;
      background: #fff;
      font-size: 14px;
      cursor: pointer;
    }

    .page-number.active {
      background: #2b7a78;
      color: #fff;
      border-color: #2b7a78;
      font-weight: 600;
    }

    .page-ellipsis {
      display: flex;
      align-items: center;
      padding: 0 4px;
      color: #999;
    }

    /* ---- Modal Konfirmasi Gabungkan Barang ---- */
    #mergeConfirmModal {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.5);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    #mergeConfirmModal .modal-box {
      background: #fff;
      border-radius: 12px;
      padding: 20px;
      max-width: 420px;
      width: 100%;
      max-height: 80vh;
      overflow-y: auto;
    }

    #mergeConfirmModal h3 {
      margin-top: 0;
      font-size: 17px;
    }

    #mergeConfirmBody p {
      font-size: 14px;
      margin: 8px 0;
      line-height: 1.4;
    }

    .merge-warning {
      color: #c0392b;
      font-weight: 600;
    }

    .modal-actions {
      display: flex;
      gap: 8px;
      margin-top: 16px;
    }

    .modal-actions button {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <!-- ============ AUTH CHECK SECTION ============ -->
  <div class="container" id="authContainer">
    <div id="loginRequiredView">
      <h1>StockDental</h1>
      <h2>Silakan login terlebih dahulu</h2>
      <p><a href="index.html">Kembali ke halaman login</a></p>
    </div>
  </div>

  <!-- ============ APP SECTION (tampil setelah login) ============ -->
  <div class="container" id="appContainer" style="display:none; padding-bottom: 80px;">

    <div class="app-header">
      <div>
        <h1>StockDental</h1>
        <h2>Inventaris</h2>
      </div>
      <button id="logoutBtn" class="btn-secondary">Logout</button>
    </div>

    <!-- SEARCH BOX -->
    <div class="form-group">
      <input type="text" id="inventarisSearchInput" placeholder="Cari nama barang..." autocomplete="off">
    </div>

    <!-- TOOLBAR: dropdown sortir + export PDF + gabungkan barang -->
    <div class="inventaris-toolbar">
      <select id="inventarisSortSelect">
        <option value="status">Urutkan: Status</option>
        <option value="nama">Urutkan: Nama</option>
        <option value="stok">Urutkan: Stok</option>
        <option value="kategori">Urutkan: Kategori</option>
      </select>
      <button id="toggleMergeModeBtn" class="btn-secondary">🔗 Gabungkan Barang</button>
      <button id="confirmMergeBtn">Gabungkan (2)</button>
      <button id="exportPdfBtn" class="btn-secondary">Export PDF</button>
    </div>
    <div id="exportStatus" class="status-message" style="display:none;"></div>
    <div id="mergeStatus" class="status-message" style="display:none;"></div>

    <!-- RINGKASAN STATUS -->
    <div id="inventarisSummary" class="inventaris-summary"></div>

    <!-- LIST BARANG -->
    <div id="inventarisList" class="inventaris-list">
      <p class="loading-text">Memuat data...</p>
    </div>

    <!-- PAGINATION -->
    <div id="inventarisPagination" class="inventaris-pagination"></div>

  </div>

  <!-- ============ MODAL: Konfirmasi Gabungkan Barang ============ -->
  <div id="mergeConfirmModal">
    <div class="modal-box">
      <h3>Konfirmasi Gabungkan Barang</h3>
      <div id="mergeConfirmBody"></div>
      <div class="modal-actions">
        <button type="button" id="mergeCancelBtn" class="btn-secondary">Batal</button>
        <button type="button" id="mergeExecuteBtn" class="btn-primary">Ya, Gabungkan</button>
      </div>
    </div>
  </div>

  <!-- ============ BOTTOM NAVIGATION ============ -->
  <nav class="bottom-nav" id="bottomNav" style="display:none;">
    <a href="ringkasan.html" class="nav-item">
      <span class="nav-icon">📊</span>
      <span class="nav-label">Ringkasan</span>
    </a>
    <a href="index.html" class="nav-item">
      <span class="nav-icon">📝</span>
      <span class="nav-label">Input</span>
    </a>
    <a href="inventaris.html" class="nav-item active">
      <span class="nav-icon">📦</span>
      <span class="nav-label">Inventaris</span>
    </a>
    <a href="history.html" class="nav-item">
      <span class="nav-icon">📈</span>
      <span class="nav-label">Riwayat</span>
    </a>
  </nav>

  <!-- Supabase library dari CDN -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<!-- pdf-lib untuk generate PDF laporan stok langsung di browser (P11) -->
<script src="https://cdn.jsdelivr.net/npm/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
<script src="js/supabase-client.js"></script>
<script src="js/inventaris.js"></script>
<script src="js/auth-check.js"></script>
</body>
</html>
