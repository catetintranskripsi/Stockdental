<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StockDental - Upgrade Premium</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/pages-override.css">
  <style>
    /* Percakapan [Batas Jumlah Barang & Kunci Akun Expired] - kerangka
       sederhana. Isi pembayaran aktual (QRIS, webhook) dibuat di sesi
       Payment Gateway Integration terpisah -- tombol di sini masih placeholder. */
    .plan-card {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
    }
    .plan-card.premium {
      border: 2px solid var(--color-primary);
    }
    .plan-title {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .plan-price {
      font-size: 22px;
      font-weight: 700;
      color: var(--color-primary);
      margin-bottom: 10px;
    }
    .plan-price small {
      font-size: 13px;
      font-weight: 400;
      color: #666;
    }
    .plan-features {
      list-style: none;
      padding: 0;
      margin: 0 0 14px 0;
      font-size: 14px;
      color: #444;
    }
    .plan-features li {
      padding: 4px 0;
    }
    .plan-buy-btn {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      font-size: 15px;
      border: none;
      background: var(--color-primary);
      color: #fff;
      cursor: pointer;
    }
    .plan-note {
      font-size: 12px;
      color: #888;
      text-align: center;
      margin-top: 6px;
    }
    .current-status {
      background: #f0f7f4;
      border-radius: 10px;
      padding: 12px;
      font-size: 14px;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>

  <div class="container" id="authContainer">
    <div id="loginRequiredView">
      <h1>StockDental</h1>
      <h2>Silakan login terlebih dahulu</h2>
      <p><a href="index.html">Kembali ke halaman login</a></p>
    </div>
  </div>

  <div class="container" id="appContainer" style="display:none; padding-bottom: 80px;">
    <div class="app-header">
      <div>
        <h1>StockDental</h1>
        <h2>Upgrade Premium</h2>
      </div>
      <button id="logoutBtn" class="btn-secondary">Logout</button>
    </div>

    <div id="currentStatusBox" class="current-status">Memuat status langganan...</div>

    <div id="plansContainer">
      <p class="loading-text">Memuat paket...</p>
    </div>
  </div>

  <nav class="bottom-nav" id="bottomNav" style="display:none;">
    <a href="ringkasan.html" class="nav-item">
      <span class="nav-icon">📊</span>
      <span class="nav-label">Ringkasan</span>
    </a>
    <a href="index.html" class="nav-item">
      <span class="nav-icon">📝</span>
      <span class="nav-label">Input</span>
    </a>
    <a href="inventaris.html" class="nav-item">
      <span class="nav-icon">📦</span>
      <span class="nav-label">Inventaris</span>
    </a>
    <a href="history.html" class="nav-item">
      <span class="nav-icon">📈</span>
      <span class="nav-label">Riwayat</span>
    </a>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/upgrade.js"></script>
  <script src="js/auth-check.js"></script>
</body>
</html>
