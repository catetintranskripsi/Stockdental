<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StockDental - Riwayat</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/pages-override.css">
  <link rel="stylesheet" href="css/floating-cs-button.css">
</head>
<body>

  <!-- ============ AUTH CHECK SECTION ============ -->
  <div class="container" id="authContainer">
    <div id="loginRequiredView">
      <h1>StockDental</h1>
      <h2>Silakan login terlebih dahulu</h2>
      <p><a href="index.html">Kembali ke halaman login</a></p>
    </div>
  </div>

  <!-- ============ APP SECTION (tampil setelah login) ============ -->
  <div class="container" id="appContainer" style="display:none; padding-bottom: 80px;">

    <div class="app-header">
      <div>
        <h1>StockDental</h1>
        <h2>Riwayat Transaksi</h2>
      </div>
      <button id="logoutBtn" class="btn-secondary">Logout</button>
    </div>

    <!-- FILTER BULAN & TAHUN -->
    <div class="filter-row">
      <div class="form-group">
        <label for="filterMonth">Bulan</label>
        <select id="filterMonth">
          <option value="0">Januari</option>
          <option value="1">Februari</option>
          <option value="2">Maret</option>
          <option value="3">April</option>
          <option value="4">Mei</option>
          <option value="5">Juni</option>
          <option value="6">Juli</option>
          <option value="7">Agustus</option>
          <option value="8">September</option>
          <option value="9">Oktober</option>
          <option value="10">November</option>
          <option value="11">Desember</option>
        </select>
      </div>

      <div class="form-group">
        <label for="filterYear">Tahun</label>
        <select id="filterYear"></select>
      </div>
    </div>

    <!-- RINGKASAN -->
    <div id="historySummary" class="history-summary"></div>

    <!-- LIST RIWAYAT -->
    <div id="historyList" class="history-list">
      <p class="loading-text">Memuat data...</p>
    </div>

  </div>

  <!-- ============ BOTTOM NAVIGATION ============ -->
  <nav class="bottom-nav" id="bottomNav" style="display:none;">
    <a href="ringkasan.html" class="nav-item">
      <span class="nav-icon">📊</span>
      <span class="nav-label">Ringkasan</span>
    </a>
    <a href="index.html" class="nav-item">
      <span class="nav-icon">📝</span>
      <span class="nav-label">Input</span>
    </a>
    <a href="inventaris.html" class="nav-item">
      <span class="nav-icon">📦</span>
      <span class="nav-label">Inventaris</span>
    </a>
    <a href="history.html" class="nav-item active">
      <span class="nav-icon">📈</span>
      <span class="nav-label">Riwayat</span>
    </a>
  </nav>

  <!-- Supabase library dari CDN -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-client.js"></script>
<script src="js/clinic-access.js"></script>
<script src="js/history.js"></script>
<script src="js/auth-check.js"></script>
<a
  href="https://gemini.google.com/gem/1mCMToMf3yuB-s34GACXkmktKla1JQWz9?usp=sharing"
  target="_blank"
  rel="noopener"
  class="cs-float-btn"
  aria-label="Tanya Asisten StockDental"
>
  <span class="cs-float-btn__icon-wrap">
    <svg class="cs-float-btn__icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M12 2C6.48 2 2 5.94 2 10.8C2 13.36 3.24 15.64 5.2 17.17C5.2 17.86 4.76 19.36 2.5 21.5C2.5 21.5 6.1 21.8 8.9 19.6C9.9 19.86 10.93 20 12 20C17.52 20 22 16.06 22 11.2C22 6.34 17.52 2 12 2Z" fill="currentColor"/>
    </svg>
    <span class="cs-float-btn__badge">AI</span>
  </span>
  <span class="cs-float-btn__label">Tanya CS</span>
</a>
</body>
</html>
