<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StockDental</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ============ AUTH SECTION ============ -->
  <div class="container" id="authContainer">

    <!-- LOGIN FORM -->
    <div id="loginView">
      <h1>StockDental</h1>
      <h2>Login</h2>

      <form id="formLogin">
        <div class="form-group">
          <label for="loginEmail">Email</label>
          <input type="email" id="loginEmail" required placeholder="email@klinik.com">
        </div>

        <div class="form-group">
          <label for="loginPassword">Password</label>
          <input type="password" id="loginPassword" required placeholder="Minimal 6 karakter">
        </div>

        <button type="submit" id="loginBtn">Login</button>
      </form>

      <p class="switch-text">Belum punya akun? <a href="#" id="showSignup">Daftar di sini</a></p>
      <div id="loginStatus" class="status-message"></div>
    </div>

    <!-- SIGNUP FORM -->
    <div id="signupView" style="display:none;">
      <h1>StockDental</h1>
      <h2>Daftar Akun Baru</h2>

      <form id="formSignup">
        <div class="form-group">
          <label for="signupClinicName">Nama Klinik/Rumah Sakit</label>
          <input type="text" id="signupClinicName" required placeholder="Contoh: Klinik Gigi Sehat Selalu">
        </div>

        <div class="form-group">
          <label for="signupEmail">Email</label>
          <input type="email" id="signupEmail" required placeholder="email@klinik.com">
        </div>

        <div class="form-group">
          <label for="signupPassword">Password</label>
          <input type="password" id="signupPassword" required placeholder="Minimal 6 karakter" minlength="6">
        </div>

        <div class="form-group">
          <label for="signupPasswordConfirm">Konfirmasi Password</label>
          <input type="password" id="signupPasswordConfirm" required minlength="6">
        </div>

        <button type="submit" id="signupBtn">Daftar</button>
      </form>

      <p class="switch-text">Sudah punya akun? <a href="#" id="showLogin">Login di sini</a></p>
      <div id="signupStatus" class="status-message"></div>
    </div>

  </div>

  <!-- ============ APP SECTION (tampil setelah login) ============ -->
  <div class="container" id="appContainer" style="display:none; padding-bottom: 80px;">

    <div class="app-header">
      <div>
        <h1>StockDental</h1>
        <h2>Input Transaksi Stok</h2>
      </div>
      <button id="logoutBtn" class="btn-secondary">Logout</button>
    </div>

    <form id="formStockMovement">

      <!-- PILIHAN JENIS TRANSAKSI -->
      <div class="form-group">
        <label for="movementType">Jenis Transaksi</label>
        <select id="movementType" required>
          <option value="">-- Pilih Jenis Transaksi --</option>
          <option value="in">Tambah Barang (Barang Masuk)</option>
          <option value="out">Penggunaan Barang (Barang Keluar)</option>
          <option value="opname_adjustment">Stok Opname</option>
        </select>
      </div>

      <!-- SEARCHABLE PILIH BARANG (dipakai untuk Out & Opname) -->
      <div class="form-group" id="productSelectGroup" style="display:none; position:relative;">
        <label for="productSearchInput">Pilih Barang</label>
        <input type="text" id="productSearchInput" placeholder="Ketik nama barang..." autocomplete="off">
        <input type="hidden" id="productSelectedId">
        <div id="productSearchResults" class="product-search-results" style="display:none;"></div>
      </div>

      <!-- ========== FIELD: TAMBAH BARANG (in) ========== -->
      <div id="fieldsIn" style="display:none;">

        <div id="newProductFields">

          <!-- NAMA BARANG - searchable, histori dari products.name -->
          <div class="form-group" style="position:relative;">
            <label for="productName">Nama Barang</label>
            <input type="text" id="productName" placeholder="Contoh: Sarung Tangan Latex M" autocomplete="off">
            <div id="productNameResults" class="product-search-results" style="display:none;"></div>
          </div>

          <!-- KATEGORI - searchable, starter list + histori -->
          <div class="form-group" style="position:relative;">
            <label for="category">Kategori</label>
            <input type="text" id="category" placeholder="Contoh: APD, Obat, BMHP" autocomplete="off">
            <div id="categoryResults" class="product-search-results" style="display:none;"></div>
          </div>

          <!-- LOKASI - searchable, full histori -->
          <div class="form-group" style="position:relative;">
            <label for="storageLocation">Lokasi Penyimpanan</label>
            <input type="text" id="storageLocation" placeholder="Contoh: Lemari A - Rak 2" autocomplete="off">
            <div id="storageLocationResults" class="product-search-results" style="display:none;"></div>
          </div>

          <div class="form-group">
            <label for="minimumStock">Stok Minimum (opsional, buat alert)</label>
            <input type="number" id="minimumStock" min="0" step="0.01" placeholder="Kosongkan jika belum tahu">
          </div>
        </div>

        <div class="form-group">
          <label for="quantity">Jumlah Masuk</label>
          <input type="number" id="quantity" min="0" step="0.01">
        </div>

        <!-- SATUAN - searchable, starter list + histori -->
        <div class="form-group" style="position:relative;">
          <label for="unit">Satuan</label>
          <input type="text" id="unit" placeholder="pcs / box / botol" value="pcs" autocomplete="off">
          <div id="unitResults" class="product-search-results" style="display:none;"></div>
        </div>

        <div class="form-group">
          <label for="expiryDate">Tanggal Kedaluwarsa (opsional)</label>
          <input type="date" id="expiryDate">
        </div>

        <!-- NOMOR BATCH - searchable, full histori -->
        <div class="form-group" style="position:relative;">
          <label for="batchNumber">Nomor Batch (opsional)</label>
          <input type="text" id="batchNumber" placeholder="Contoh: BTC-2026-001" autocomplete="off">
          <div id="batchNumberResults" class="product-search-results" style="display:none;"></div>
        </div>
      </div>

      <!-- ========== FIELD: PENGGUNAAN BARANG (out) ========== -->
      <div id="fieldsOut" style="display:none;">
        <div class="form-group">
          <label for="outQuantity">Jumlah Dipakai</label>
          <input type="number" id="outQuantity" min="0" step="0.01">
        </div>

        <div class="form-group">
          <label for="outReason">Alasan</label>
          <select id="outReason">
            <option value="pemakaian_pasien">Pemakaian Pasien</option>
            <option value="rusak">Rusak</option>
            <option value="hilang">Hilang</option>
            <option value="lainnya">Lainnya</option>
          </select>
        </div>
      </div>

      <!-- ========== FIELD: STOK OPNAME ========== -->
      <div id="fieldsOpname" style="display:none;">
        <div class="form-group">
          <label for="opnamePhysicalCount">Jumlah Fisik (Hasil Hitung Riil)</label>
          <input type="number" id="opnamePhysicalCount" min="0" step="0.01">
        </div>

        <div id="opnamePreview" class="opname-preview"></div>

        <div class="form-group">
          <label for="opnameNote">Catatan (opsional)</label>
          <input type="text" id="opnameNote" placeholder="Contoh: Hasil opname bulanan Juli">
        </div>
      </div>

      <button type="submit" id="submitBtn">Simpan Transaksi</button>
    </form>

    <div id="statusMessage"></div>
  </div>

  <!-- ============ BOTTOM NAVIGATION ============ -->
  <nav class="bottom-nav" id="bottomNav" style="display:none;">
    <a href="ringkasan.html" class="nav-item">
      <span class="nav-icon">📊</span>
      <span class="nav-label">Ringkasan</span>
    </a>
    <a href="index.html" class="nav-item active">
      <span class="nav-icon">📝</span>
      <span class="nav-label">Input</span>
    </a>
    <a href="inventaris.html" class="nav-item">
      <span class="nav-icon">📦</span>
      <span class="nav-label">Inventaris</span>
    </a>
    <a href="history.html" class="nav-item">
      <span class="nav-icon">📈</span>
      <span class="nav-label">Riwayat</span>
    </a>
  </nav>

  <!-- Supabase library dari CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/app.js?v=3"></script>
  <script src="js/auth.js"></script>
</body>
</html>
