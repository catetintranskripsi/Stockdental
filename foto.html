<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StockDental - Foto Barang</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/foto.css">
  <link rel="stylesheet" href="css/foto-override.css">
</head>
<body>

  <!-- ============================================ -->
  <!-- Percakapan 7 - HALAMAN FOTO EKSTRAKSI AI -->
  <!-- Percakapan [lanjutan] - Label diarahkan ke galeri (kamera langsung -->
  <!-- terbukti bermasalah "sisa memori tidak cukup" di beberapa device -->
  <!-- saat dipanggil dari Chrome; galeri terbukti stabil) -->
  <!-- ============================================ -->

  <!-- ============ AUTH CHECK SECTION ============ -->
  <div class="container" id="authContainer">
    <div id="loginRequiredView">
      <h1>StockDental</h1>
      <h2>Silakan login terlebih dahulu</h2>
      <p><a href="index.html">Kembali ke halaman login</a></p>
    </div>
  </div>

  <!-- ============ APP SECTION (tampil setelah login) ============ -->
  <div class="container" id="appContainer" style="display:none; padding-bottom: 80px;">

    <div class="app-header">
      <div>
        <h1>StockDental</h1>
        <h2>Foto Barang / Faktur</h2>
      </div>
      <button id="logoutBtn" class="btn-secondary">Logout</button>
    </div>

    <!-- Sub-tab metode input: sama persis dipasang di index.html & (nanti) suara.html -->
    <div class="sub-tab-row">
      <a href="index.html" class="sub-tab-item">Manual</a>
      <a href="foto.html" class="sub-tab-item sub-tab-active">Foto</a>
      <a href="suara.html" class="sub-tab-item">Suara</a>
    </div>

    <p class="page-subtitle">Ambil foto barang atau faktur, AI akan bantu baca datanya</p>

    <!-- STEP 1: Upload/Ambil Foto -->
    <div id="uploadSection" class="card">
      <label for="photoInput" class="upload-box">
        <span class="upload-icon">📷</span>
        <span id="uploadLabel">Tap untuk ambil gambar dari galeri</span>
        <input type="file" id="photoInput" accept="image/*" hidden>
      </label>

      <img id="photoPreview" class="photo-preview" style="display:none;" alt="Preview foto">

      <button id="analyzeBtn" class="btn-primary" style="display:none;" disabled>
        Analisis dengan AI
      </button>

      <div id="uploadStatus" class="status-message" style="display:none;"></div>
    </div>

    <!-- STEP 2: Hasil Ekstraksi (editable) -->
    <div id="resultSection" class="card" style="display:none;">
      <h2>Hasil Deteksi</h2>
      <p id="resultSummary" class="result-summary"></p>

      <div id="extractedItemsList"></div>

      <button id="addManualRowBtn" class="btn-secondary">+ Tambah baris manual</button>

      <div class="button-row">
        <button id="cancelResultBtn" class="btn-cancel">Batal</button>
        <button id="saveAllBtn" class="btn-primary">Simpan Semua</button>
      </div>

      <div id="saveStatus" class="status-message" style="display:none;"></div>
    </div>

  </div>

  <!-- ============ BOTTOM NAVIGATION ============ -->
  <nav class="bottom-nav" id="bottomNav" style="display:none;">
    <a href="ringkasan.html" class="nav-item">
      <span class="nav-icon">📊</span>
      <span class="nav-label">Ringkasan</span>
    </a>
    <a href="index.html" class="nav-item active">
      <span class="nav-icon">📝</span>
      <span class="nav-label">Input</span>
    </a>
    <a href="inventaris.html" class="nav-item">
      <span class="nav-icon">📦</span>
      <span class="nav-label">Inventaris</span>
    </a>
    <a href="history.html" class="nav-item">
      <span class="nav-icon">📈</span>
      <span class="nav-label">Riwayat</span>
    </a>
  </nav>

  <!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-client.js"></script>
<script src="js/ai-queue-helper.js"></script>
<script src="js/foto.js"></script>
<script src="js/auth-check.js"></script>
</body>
</html>
